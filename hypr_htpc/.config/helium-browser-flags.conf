# Helium/Chromium hardware video acceleration for NVIDIA on Wayland
# Based on ArchWiki Chromium + Chromium VA-API docs

--ignore-gpu-blocklist
--enable-gpu-rasterization
--enable-zero-copy
--enable-accelerated-2d-canvas
--enable-accelerated-mjpeg-decode
--ozone-platform=wayland
--use-gl=angle
--use-angle=gl
--enable-features=AcceleratedVideoDecodeLinuxGL,AcceleratedVideoDecodeLinuxZeroCopyGL,AcceleratedVideoEncoder,VaapiOnNvidiaGPUs,ParallelDownloading
--disable-features=Vulkan
