# Application bindings
$terminal = ghostty
$browser = firefox

# App launcher - SUPER+Space
bind = SUPER, SPACE, exec, bash -lc 'pkill -x wofi || exec wofi --show drun'

# Terminal
bind = SUPER, RETURN, exec, $terminal
bind = SUPER, BackSpace, exec, nautilus --new-window
bind = SUPER SHIFT, D, exec, $terminal -e lazydocker

# System
bind = SUPER CTRL SHIFT, S, exec, /usr/bin/systemctl suspend
unbind = CTRL ALT, DELETE
bind = CTRL ALT, DELETE, exec, $terminal -e btop

# Screenshot/Color picker
bind = SUPER CTRL, S, exec, pkill hyprpicker || hyprpicker -a

# Close window
bind = SUPER, W, killactive

# Switch workspaces SUPER + J/K/L/Ö (Swedish, current monitor only)
unbind = SUPER, J
unbind = SUPER, K
bind = SUPER, J, focusworkspaceoncurrentmonitor, 1
bind = SUPER, K, focusworkspaceoncurrentmonitor, 2
bind = SUPER, L, focusworkspaceoncurrentmonitor, 3
bind = SUPER, odiaeresis, focusworkspaceoncurrentmonitor, 4
bind = SUPER, code:14, focusworkspaceoncurrentmonitor, 5
bind = SUPER, code:15, focusworkspaceoncurrentmonitor, 6
bind = SUPER, code:16, focusworkspaceoncurrentmonitor, 7
bind = SUPER, code:17, focusworkspaceoncurrentmonitor, 8
bind = SUPER, code:18, focusworkspaceoncurrentmonitor, 9

# Move window SUPER+SHIFT + J/K/L/Ö
bind = SUPER SHIFT, J, movetoworkspace, 1
bind = SUPER SHIFT, K, movetoworkspace, 2
bind = SUPER SHIFT, L, movetoworkspace, 3
bind = SUPER SHIFT, odiaeresis, movetoworkspace, 4
bind = SUPER SHIFT, code:14, movetoworkspace, 5
bind = SUPER SHIFT, code:15, movetoworkspace, 6
bind = SUPER SHIFT, code:16, movetoworkspace, 7
bind = SUPER SHIFT, code:17, movetoworkspace, 8
bind = SUPER SHIFT, code:18, movetoworkspace, 9

# Move focus
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# ALT+TAB
unbind = ALT, TAB
unbind = ALT SHIFT, TAB
bind = ALT, TAB, cyclenext
bind = ALT SHIFT, TAB, cyclenext, prev

# Exit
bind = SUPER SHIFT, E, exit

# YouTube kiosk mode (flags from ~/.config/helium-browser-flags.conf)
bind = SUPER, A, exec, helium-browser --start-fullscreen https://youtube.com

# YouTube TV (spoofed user agent)
bind = SUPER, Q, exec, helium-browser --start-fullscreen --user-data-dir=$HOME/.config/helium-tv --user-agent="Mozilla/5.0 (SMART-TV; Linux; Tizen 5.0) AppleWebKit/537.36 (KHTML, like Gecko) Version/5.0 TV Safari/537.36" https://youtube.com/tv

# Fullscreen
bind = SUPER, F, fullscreen
