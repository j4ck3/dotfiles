# Keep the compositor environment minimal. App-specific NVIDIA/VA-API
# variables belong in app wrappers such as ~/.local/bin/helium-browser.
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# TV cursor (1440p scale 1.25)
env = XCURSOR_SIZE,48

env = __GL_VRR_ALLOWED,0

env = COLOR_SCHEME,prefer-dark
env = GTK_THEME,Adwaita-dark
env = GTK2_RC_FILES,$HOME/.gtkrc-2.0
env = QT_QPA_PLATFORMTHEME,gtk3
env = QT_STYLE_OVERRIDE,Fusion
