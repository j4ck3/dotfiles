# One Chromium/Helium flag per line.
# Blank lines and lines starting with # are ignored.
# After editing: quit Helium completely (all windows) and reopen so /usr/bin/helium-browser re-reads this file.

# Keep cookie behavior unrestricted (your preference).

# Start on Startpage.
--homepage=https://www.startpage.com/

# No "Restore pages?" bubble after unclean shutdown (power off without quitting Helium).
--hide-crashed-bubble

# Backend selection:
# - auto chooses Wayland on Hyprland sessions
# - falls back when Wayland vars are not present
--ozone-platform-hint=auto

# Hyprland/Wayland is on Intel; Chromium otherwise forces renderD129 (iGPU). AMD = 03:00.0.
--render-node-override=/dev/dri/by-path/pci-0000:03:00.0-render

# After GPU driver updates Chromium may blocklist AMDGPU and degrade the graphics path.
--ignore-gpu-blocklist

# GPU in Chromium is three layers:
#   1) UI compositing (--enable-gpu-rasterization) — ON, uses RX 7900 via render-node-override
#   2) Page GL (ANGLE + OpenGL) — ON; raw --use-gl=egl is not supported on this Helium build
#   3) Hardware VIDEO decode (VAAPI) — ON (Tier B); if YouTube goes white, revert to Tier A below
#
# WebGPU (shaders.com, Figma-like sites) needs Vulkan available on Linux. Do NOT add Vulkan to
# --disable-features; that yields "No available adapters" and blank shader previews.
#
# Why full GPU video fails: Intel iGPU + RX 7900 hybrid. Hyprland composites on AMD (DP-1).
# Forcing Chromium to RX 7900 then enabling Vulkan ANGLE + VAAPI + zero-copy makes decoded
# frames that never reach the Wayland surface (white player, audio may still work via PipeWire).
# Tier A uses --use-angle=gl (not vulkan) so WebGPU works without breaking YouTube.
#
# Tier A: GPU UI, CPU video decode — fallback if Tier B shows white video.
# Tier B (active): GPU UI + AMD VAAPI hardware video decode.
# Tier C: --disable-gpu — slowest, use only if A and B both fail.
#
# If video is still blank on Tier B, swap back to Tier A block below.
# --disable-gpu
--use-gl=angle
--use-angle=gl
--enable-gpu-rasterization
--enable-accelerated-video-decode
--enable-features=VaapiVideoDecoder,VaapiVideoDecodeLinuxGL
--disable-features=WaylandWpColorManagerV1
# Do NOT re-enable: --use-angle=vulkan, --enable-zero-copy, VaapiOnNvidiaGPUs

# --- Tier A fallback (CPU video decode) ---
# --use-gl=angle
# --use-angle=gl
# --enable-gpu-rasterization
# --disable-accelerated-video-decode
# --disable-features=WaylandWpColorManagerV1,VaapiVideoDecoder,VaapiVideoDecodeLinuxGL

# SDR desktop: stable page colors and text (no stacked HDR tonemapping with Hyprland).
--force-color-profile=srgb
