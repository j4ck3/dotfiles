# Extra autostart processes
# exec-once = uwsm-app -- my-service

# Polkit: pkexec / privilege prompts. polkit-gnome alone often fails on Hyprland+uwsm; install hyprpolkitagent.
# Logs: $XDG_RUNTIME_DIR/polkit-agent.log
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY HYPRLAND_INSTANCE_SIGNATURE XDG_CURRENT_DESKTOP DISPLAY 2>/dev/null || true
exec-once = ~/.config/hypr/scripts/start-keyring
exec-once = ~/.config/hypr/scripts/start-polkit-agent

exec-once = ~/.config/hypr/scripts/waybar-with-widgets
exec-once = ~/.config/hypr/scripts/start-elephant
exec-once = ~/.config/hypr/scripts/start-walker-service
exec-once = helium-browser
exec-once = enable-keyboard-wake

# Spotify resets sink-input volume on new tracks; user service survives hyprctl reload (exec-once does not)
exec-once = systemctl --user start spotify-volume-guard.service

# Workspace 2 monocle mode - maximize and stack all windows
exec-once = ~/.config/hypr/scripts/workspace2-monocle

# 16:9 group: SUPER+Return opens terminal in 16:9; other first apps via listener below.
exec-once = ~/.config/hypr/scripts/group-new-window-listener-watchdog

# Cursor → Workspace 2
windowrule {
  name = cursor-ws-2
  workspace = 2
  match:class = ^(cursor)$
}

# Spotify → Workspace 3
windowrule {
  name = spotify-ws-3
  workspace = 3
  match:class = ^(spotify)$
}

# Web apps → Workspaces 10, 11, 12 (must match bindings.conf + webapp-launch)

# Trilium → Workspace 10
windowrule {
  name = trillium-ws-10
  workspace = 10
  match:class = ^(helium)$
  match:title = .*[Tt]rillium.*
}

# ChatGPT → Workspace 11
windowrule {
  name = chatgpt-ws-11
  workspace = 11
  match:class = ^(helium)$
  match:title = .*[Cc]hat[Gg][Pp][Tt].*
}

# YouTube → Workspace 12
windowrule {
  name = youtube-ws-12
  workspace = 12
  match:class = ^(helium)$
  match:title = .*[Yy]outube.*
}

# No catch-all rule for class helium. A rule like "all other helium → workspace 1"
# also matched file-picker and print dialogs (same WM_CLASS, generic titles), so they
# jumped to workspace 1. Generic browser windows stay on the workspace where they open.

# Background Helium (homepage on ws 1, notifications, restarts) must not activate-focus
# the compositor while you work on another workspace. Click-to-focus still works.
windowrule {
  name = helium-no-focus-steal
  match:class = ^(helium)$
  focus_on_activate = false
  suppress_event = activate activatefocus
}

