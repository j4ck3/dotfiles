# Control your input devices
# See https://wiki.hypr.land/Configuring/Variables/#input
input {
  # Use multiple keyboard layouts and switch between them with Left Alt + Right Alt
  # kb_layout = us,dk,eu
  kb_layout = se
  kb_options = caps:escape # Caps Lock sends Escape

  # Change speed of keyboard repeat
  repeat_rate = 40
  repeat_delay = 600

  # Start with numlock on by default
  numlock_by_default = true

  # Increase sensitivity for mouse/trackpad (default: 0)
  # Negative values decrease sensitivity, positive values increase it
  sensitivity = -0.2

  touchpad {
    # Use natural (inverse) scrolling
    # natural_scroll = true

    # Use two-finger clicks for right-click instead of lower-right corner
    # clickfinger_behavior = true

    # Control the speed of your scrolling
    scroll_factor = 0.4
  }
}

# Scroll nicely in the terminal
# Note: scrolltouchpad is not a valid option in current Hyprland versions
# windowrulev2 = scrolltouchpad 1.5, class:(Alacritty|kitty)
# windowrulev2 = scrolltouchpad 0.2, class:com.mitchellh.ghostty

# Enable touchpad gestures for changing workspaces
# See https://wiki.hyprland.org/Configuring/Gestures/
# gesture = 3, horizontal, workspace

# Phantom HID keyboards (consumer/system control) can leave Ctrl/Shift stuck after USB glitches.

# Razer mouse dongle
device {
  name = razer-razer-viper-ultimate-dongle-keyboard
  enabled = false
}
device {
  name = razer-razer-viper-ultimate-dongle-1
  enabled = false
}
device {
  name = razer-razer-viper-ultimate-keyboard
  enabled = false
}
device {
  name = razer-razer-viper-ultimate
  enabled = false
}

# Keychron Q1 (keep keychron-keychron-q1-keyboard)
device {
  name = keychron-keychron-q1-consumer-control
  enabled = false
}
device {
  name = keychron-keychron-q1-system-control
  enabled = false
}
device {
  name = keychron-keychron-q1
  enabled = false
}

# ZSA Voyager (keep zsa-technology-labs-voyager-keyboard)
device {
  name = zsa-technology-labs-voyager
  enabled = false
}
device {
  name = zsa-technology-labs-voyager-system-control
  enabled = false
}
device {
  name = zsa-technology-labs-voyager-consumer-control
  enabled = false
}
