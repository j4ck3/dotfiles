# Look and feel configuration

# Variables (from default)
$activeBorderColor = rgba(33ccffee) rgba(00ff99ee) 45deg
$inactiveBorderColor = rgba(595959aa)

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 4
    border_size = 0
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 8
    shadow {
        enabled = true
        range = 2
        render_power = 3
        color = rgba(1a1a1aee)
    }
    blur {
        # Blur at 3440x1440@240 on RX 7900 can flicker with Aquamarine atomic commits; re-enable
        # after send_content_type/AQ_NO_ATOMIC fixes if you want the look back.
        enabled = false
        size = 3
        passes = 1
    }
}

# https://wiki.hypr.land/Configuring/Variables/#group
group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
    col.border_locked_active = $activeBorderColor
    col.border_locked_inactive = $inactiveBorderColor
    groupbar {
        enabled = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = no
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 0, 0, ease
}

# https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    preserve_split = true
    force_split = 2
    # Your custom option (commented out)
    # single_window_aspect_ratio = 1 1
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#render
# Stop reporting content_type every frame (triggers monitor renegotiation / flicker on some DP panels).
render {
    direct_scanout = 0
    send_content_type = 0
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
# Override misc section (removes invalid new_window_takes_over_fullscreen option)
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = false
    anr_missed_pings = 3
    vrr = 0  # VRR/FreeSync off — vrr=1 flickered the desktop; vrr=2 still flickered on 240 Hz panel
    background_color = 0xff1e1e2e
}

# https://wiki.hypr.land/Configuring/Variables/#cursor
cursor {
    # Never auto-hide (idle / keys / touch).
    hide_on_key_press = false
    hide_on_touch = false
    hide_on_tablet = false
    inactive_timeout = 0
    # AMDGPU @ high refresh: HW cursor plane often stops drawing until the pointer moves.
    no_hardware_cursors = 1
}

# Style Gum confirm to match terminal theme
env = GUM_CONFIRM_PROMPT_FOREGROUND,6
env = GUM_CONFIRM_SELECTED_FOREGROUND,0
env = GUM_CONFIRM_SELECTED_BACKGROUND,2
env = GUM_CONFIRM_UNSELECTED_FOREGROUND,0
env = GUM_CONFIRM_UNSELECTED_BACKGROUND,8

# Layer rules
layerrule = no_anim on, match:namespace selection
layerrule = no_anim on, match:namespace walker
layerrule = dim_around on, match:namespace walker
# Waybar blur was a big per-frame cost on the 3440x1440 panel; disable it so the
# compositor can sustain higher FPS. Re-enable if the bar contrast suffers.
# layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
# layerrule = blur on, match:namespace volume-popup
layerrule = ignore_alpha 0.2, match:namespace volume-popup
layerrule = no_anim on, match:namespace volume-popup
layerrule = no_anim on, match:namespace power-menu
layerrule = no_anim on, match:namespace media-player

# Confirmation dialog for SUPER+W
windowrule {
    name = close-window-confirmation
    match:title = ^Close window\?$

    float = true
    center = true
    pin = true
}

# Workspace 2: Monocle mode - windows maximized and stacked (handled by workspace2-monocle script)
# Uses normal gaps/borders like other workspaces
