# Application bindings
$terminal = uwsm-app -- xdg-terminal-exec
$browser = helium-browser

bindd = SUPER, RETURN, Terminal, exec, ~/.config/hypr/scripts/launch-terminal-16-9
bindd = SUPER, BackSpace, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT ALT, B, Browser (private), exec, $browser --private
bindd = SUPER SHIFT, M, Music, exec, uwsm-app -- flatpak run com.spotify.Client
bindd = SUPER, M, Spotify (workspace 15), exec, /home/jacke/.config/hypr/scripts/spotify-workspace 15
bindd = SUPER, K, Switch to workspace 2, focusworkspaceoncurrentmonitor, 2
bindd = SUPER, N, SSH devbox, exec, ghostty -e ssh devbox
bindd = SUPER SHIFT, N, Editor, exec, uwsm-app -- cursor
bindd = SUPER SHIFT, D, Docker, exec, $terminal -e lazydocker
# System sleep
bindd = SUPER CTRL SHIFT, S, Sleep/Suspend, exec, /usr/bin/systemctl suspend
bindd = CTRL ALT SHIFT, S, Sleep/Suspend, exec, /usr/bin/systemctl suspend

# System monitor
bindd = CTRL ALT, DELETE, System monitor, exec, $terminal -e btop

# GParted: menu entry uses pkexec; if polkit still fails, use this (asks sudo in terminal) or ~/.config/hypr/scripts/gparted-root
bindd = SUPER SHIFT, G, GParted (sudo), exec, $terminal -e sudo -E /usr/lib/gparted/gpartedbin

# Window management
bindd = SUPER, W, Close window, exec, ~/.config/hypr/scripts/confirm-close-window
bindd = SUPER, F, Full screen, fullscreen, 0

# Switch focus with SUPER + arrow keys
bindd = SUPER, LEFT, Move focus left, movefocus, l
bindd = SUPER, RIGHT, Move focus right, movefocus, r
bindd = SUPER, UP, Move focus up, movefocus, u
bindd = SUPER, DOWN, Move focus down, movefocus, d
bindd = SUPER, T, Toggle 16:9 group stack, exec, ~/.config/hypr/scripts/toggle-group-workspace

# Keyboard shortcuts guide (Super+?)
bindd = SUPER SHIFT, plus, Keyboard shortcuts (Super+?), exec, ~/.config/waybar/scripts/shortcuts-cheatsheet-toggle.sh
bindd = SUPER SHIFT, slash, Keyboard shortcuts (Super+?), exec, ~/.config/waybar/scripts/shortcuts-cheatsheet-toggle.sh
bindd = SUPER, question, Keyboard shortcuts (Super+?), exec, ~/.config/waybar/scripts/shortcuts-cheatsheet-toggle.sh

# App launcher
bindd = SUPER, SPACE, Launch apps, exec, walker --width 644 --maxheight 300 --minheight 300
bindd = SUPER, C, Clipboard history, exec, ~/.config/hypr/scripts/open-clipboard-history

# Screenshot bindings - using grim + slurp + satty
bindd = SUPER, mouse:272, Screenshot region to clipboard, exec, grim -g "$(slurp)" - | wl-copy
bindd = SHIFT, Prior, Screenshot with editing, exec, grim -g "$(slurp)" - | satty --filename - --output-filename ~/Pictures/screenshot-$(date +'%Y-%m-%d_%H-%M-%S').png --early-exit --copy-command 'wl-copy'
bindd = , Next, Screenshot full screen, exec, grim - | wl-copy
bindd = SUPER, Prior, Color picker, exec, pkill hyprpicker || hyprpicker -a

# Voice and OCR bindings
bindd = SUPER, V, Live dictation (type as you speak), exec, ~/.config/hypr/scripts/stt-dictate
bindd = SUPER SHIFT, V, OCR region to clipboard, exec, ~/.config/hypr/scripts/ocr-region
bindd = SUPER ALT, V, Text to speech (TTS), exec, ~/.config/hypr/scripts/tts-speak

# Web apps - switch to workspace, launch app if not already there
# SUPER I: Trilium (workspace 10)
bindd = SUPER, I, Trilium (workspace 10), exec, /home/jacke/.config/hypr/scripts/webapp-launch 10 helium helium-browser --new-window https://trilium.netbird.hjacke.com/
bindd = SUPER SHIFT, I, Move active window to workspace 10, exec, ~/.config/hypr/scripts/move-active-to-workspace 10

# SUPER U: ChatGPT (workspace 11)
bindd = SUPER, U, ChatGPT (workspace 11), exec, /home/jacke/.config/hypr/scripts/webapp-launch 11 helium helium-browser --new-window https://chatgpt.com
bindd = SUPER SHIFT, U, Move active window to workspace 11, exec, ~/.config/hypr/scripts/move-active-to-workspace 11

# SUPER Y: YouTube (workspace 12)
bindd = SUPER, Y, YouTube (workspace 12), exec, /home/jacke/.config/hypr/scripts/webapp-launch 12 helium helium-browser --new-window https://youtube.com
bindd = SUPER SHIFT, Y, Move active window to workspace 12, exec, ~/.config/hypr/scripts/move-active-to-workspace 12

# Switch workspaces with SUPER + [1-9] (on current monitor only)
bindd = SUPER, J, Switch to workspace 1, focusworkspaceoncurrentmonitor, 1
bindd = SUPER, L, Switch to workspace 3, focusworkspaceoncurrentmonitor, 3
bindd = SUPER, odiaeresis, Switch to workspace 4, focusworkspaceoncurrentmonitor, 4
bindd = SUPER, code:14, Switch to workspace 5, focusworkspaceoncurrentmonitor, 5
bindd = SUPER, code:15, Switch to workspace 6, focusworkspaceoncurrentmonitor, 6
bindd = SUPER, code:16, Switch to workspace 7, focusworkspaceoncurrentmonitor, 7
bindd = SUPER, code:17, Switch to workspace 8, focusworkspaceoncurrentmonitor, 8
bindd = SUPER, code:18, Switch to workspace 9, focusworkspaceoncurrentmonitor, 9

# Move active window to a workspace with SUPER + SHIFT + [1-9]
bindd = SUPER SHIFT, J, Move active window to workspace 1, exec, ~/.config/hypr/scripts/move-active-to-workspace 1
bindd = SUPER SHIFT, K, Move active window to workspace 2, exec, ~/.config/hypr/scripts/move-active-to-workspace 2
bindd = SUPER SHIFT, L, Move active window to workspace 3, exec, ~/.config/hypr/scripts/move-active-to-workspace 3
bindd = SUPER SHIFT, odiaeresis, Move active window to workspace 4, exec, ~/.config/hypr/scripts/move-active-to-workspace 4
bindd = SUPER SHIFT, code:14, Move active window to workspace 5, exec, ~/.config/hypr/scripts/move-active-to-workspace 5
bindd = SUPER SHIFT, code:15, Move active window to workspace 6, exec, ~/.config/hypr/scripts/move-active-to-workspace 6
bindd = SUPER SHIFT, code:16, Move active window to workspace 7, exec, ~/.config/hypr/scripts/move-active-to-workspace 7
bindd = SUPER SHIFT, code:17, Move active window to workspace 8, exec, ~/.config/hypr/scripts/move-active-to-workspace 8
bindd = SUPER SHIFT, code:18, Move active window to workspace 9, exec, ~/.config/hypr/scripts/move-active-to-workspace 9

# ALT+TAB: group-aware cycling (tabs when grouped, windows otherwise)
bindd = ALT, TAB, Cycle next (group-aware), exec, ~/.config/hypr/scripts/smart-cycle
# Shift+Tab reports ISO_Left_Tab, not TAB — bind both (hyprwm/Hyprland#266)
bindd = ALT SHIFT, TAB, Cycle prev (group-aware), exec, ~/.config/hypr/scripts/smart-cycle prev
bindd = ALT SHIFT, ISO_Left_Tab, Cycle prev (group-aware), exec, ~/.config/hypr/scripts/smart-cycle prev

# Media controls
bindld = , F7, Spotify previous track, exec, playerctl --player=spotify previous
bindld = , F8, Spotify play/pause, exec, playerctl --player=spotify play-pause
bindld = , F9, Spotify next track, exec, playerctl --player=spotify next
bindled = , F11, Spotify volume down, exec, /home/jacke/.config/hypr/scripts/spotify-volume down
bindled = , F12, Spotify volume up, exec, /home/jacke/.config/hypr/scripts/spotify-volume up

# Open lproject in tmux with nvim and opencode
bindd = SUPER SHIFT, O, Open project (tmux+nvim+opencode), exec, ~/.config/hypr/scripts/open-project-tmux
