# See https://wiki.hyprland.org/Configuring/Monitors/
# List current monitors and resolutions possible: hyprctl monitors all
# Format: monitor = name, resolution@hz, position, scale

# Safe defaults for the current AMD desktop.
# Your connected output is currently DP-1. The old config forced HDMI-A-2,
# which does not exist on this system, and disabled DP-1 entirely.
env = GDK_SCALE,1

# LG 3440x1440: EDID advertises two different "preferred" 3440x1440 modes (~100 Hz and ~240 Hz).
# Lock the exact peak mode so Hyprland never picks the wrong one.
# (Kernel can still be verified with: modetest -M amdgpu -c | sed -n '/^DP-1/,/^[^ ]/p')
monitor = DP-1, 3440x1440@240.09, auto, 1

# The LG panel is also visible over HDMI-A-3 when both cables are attached.
# Keep it disabled so Hyprland does not create a second desktop on the same monitor.
monitor = HDMI-A-3, disable

# If you later move the cable back to HDMI, max refresh on that connector.
monitor = HDMI-A-1, highrr, auto, 1

# Fallback for any other connector you plug in later.
monitor = , preferred, auto, 1

# Good compromise for 27" or 32" 4K monitors (but fractional!)
# env = GDK_SCALE,1.75
# monitor=,preferred,auto,1.666667

# Straight 1x setup for low-resolution displays like 1080p or 1440p
# env = GDK_SCALE,1
# monitor=,preferred,auto,1

# Example for Framework 13 w/ 6K XDR Apple display
# monitor = DP-5, 6016x3384@60, auto, 2
# monitor = eDP-1, 2880x1920@120, auto, 2
