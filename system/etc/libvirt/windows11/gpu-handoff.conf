# Machine profile: CachyOS + Hyprland + RX 7900 XTX (single-GPU passthrough)
# Installed to /etc/libvirt/windows11/gpu-handoff.conf

DOMAIN=windows11

# libvirt nodedev names (virsh nodedev-list | grep 03_00)
GPU_NODE=pci_0000_03_00_0
AUDIO_NODE=pci_0000_03_00_1

# PCI BDF for virsh/virt-xml helpers
GPU_PCI=0000:03:00.0
AUDIO_PCI=0000:03:00.1

# Ly runs as templated TTY units on this host; no display-manager.service alias exists.
DISPLAY_MANAGER_UNITS=(ly@tty1.service ly@tty2.service)
CONSOLE_USER=jacke

# Seconds after stopping Hyprland before detach (joeknock90 / VFIO-Tools use ~2–3)
DETACH_SLEEP=3

# 1 = skip EFI framebuffer unbind/bind (try if AMD host acts up; RX 7900 usually keeps 0)
SKIP_EFI_FB=0

# 1 = modprobe -r amdgpu after display stack is down, before virsh nodedev-detach
UNLOAD_AMGPU=1

# Seconds to wait for Hyprland/Xwayland after stopping display manager units
DISPLAY_STOP_TIMEOUT=12

# Post-VM host recovery. Fixes cases where managed USB/evdev passthrough or VM
# shutdown leaves keyboard/mouse or LAN bridge half-attached on the host.
RECOVER_INPUT=1
USB_HID_IDS=(1532:007a 3434:0108 1532:007b 361d:0100)

RECOVER_NETWORK=1
NETWORK_CONNECTIONS=(br0 eno1 "Wired connection 1")

# After passthrough ends, auto-start Hyprland (uwsm) instead of leaving ly login.
AUTO_RESTORE_HYPRLAND=1
