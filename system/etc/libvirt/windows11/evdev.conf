# Evdev devices for windows11 passthrough (edit if you change keyboard/mouse).
# Only paths containing "event" are valid. Test with: cat DEV; wiggle mouse / type keys
KEYBOARD_DEV=/dev/input/by-id/usb-Keychron_Keychron_Q1-event-kbd
MOUSE_DEV=/dev/input/by-id/usb-Razer_Razer_Viper_Ultimate_Dongle-event-mouse
GRAB_TOGGLE=ctrl-ctrl
