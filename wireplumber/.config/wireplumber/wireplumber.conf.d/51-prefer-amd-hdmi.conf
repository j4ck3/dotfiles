# Prefer RX 7900 HDMI (LG ULTRAGEAR+) over Intel ALC1220 analog on the desktop.
# Without this, new apps (Spotify, browsers) default to motherboard line-out.

monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_03_00_1"
      }
    ]
    actions = {
      update-props = {
        api.alsa.priority = 1000
        priority.driver = 1000
        priority.session = 1000
      }
    }
  }
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_00_1f_3"
      }
    ]
    actions = {
      update-props = {
        api.alsa.priority = 100
        priority.driver = 100
        priority.session = 100
      }
    }
  }
]
