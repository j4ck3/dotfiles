# Prefer Sound Blaster Play! 3 (USB DAC on KVM/switch) over GPU HDMI and Intel analog.
# Product 0x324d = Play! 3; other Creative devices are unaffected.

monitor.alsa.rules = [
  {
    matches = [
      {
        device.vendor.id = "0x041e"
        device.product.id = "0x324d"
      }
    ]
    actions = {
      update-props = {
        api.alsa.priority = 2000
        priority.driver = 2000
        priority.session = 2000
      }
    }
  }
]
